name: build QEMU Linux prebuild

on:
  workflow_dispatch:
    inputs:
      qemu_version:
        description: "QEMU version, example: 10.2.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build qemu ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-26.04
            cflags: "-O2 -pipe -march=x86-64 -mtune=generic -fno-plt -fno-semantic-interposition -Wl,-O2"

          - arch: x64-v2
            runner: ubuntu-26.04
            cflags: "-O2 -pipe -march=x86-64-v2 -mtune=generic -fno-plt -fno-semantic-interposition -Wl,-O2"

          - arch: x64-v3
            runner: ubuntu-26.04
            cflags: "-O2 -pipe -march=x86-64-v3 -mtune=generic -fno-plt -fno-semantic-interposition -Wl,-O2"

          - arch: arm64
            runner: ubuntu-26.04-arm
            cflags: "-O2 -pipe -fno-plt -fno-semantic-interposition -Wl,-O2"

    env:
      QEMU_VERSION: ${{ inputs.qemu_version }}
      PREFIX_DIR: qemu-linux-${{ matrix.arch }}

    steps:
      - name: Prepare tools
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            ninja-build \
            pkg-config \
            python3 \
            python3-venv \
            python3-pip \
            libglib2.0-dev \
            libpixman-1-dev \
            libslirp-dev \
            libfdt-lib \
            zlib1g-dev \
            libaio-dev \
            libcap-ng-dev \
            libattr1-dev \
            libseccomp-dev \
            libusb-1.0-0-dev \
            libzstd-dev \
            wget \
            curl \
            ca-certificates \
            xz-utils \
            tar \
            file

      - name: Download QEMU source
        shell: bash
        run: |
          set -euo pipefail

          wget -O "qemu-${QEMU_VERSION}.tar.xz" \
            "https://download.qemu.org/qemu-${QEMU_VERSION}.tar.xz"

          tar -xf "qemu-${QEMU_VERSION}.tar.xz"

      - name: Build QEMU
        shell: bash
        run: |
          set -euo pipefail

          export CFLAGS="${{ matrix.cflags }} -flto=auto -fno-plt -fno-semantic-interposition"
          export CXXFLAGS="${{ matrix.cflags }} -flto=auto -fno-plt -fno-semantic-interposition"
          export LDFLAGS="-Wl,-O1 -Wl,--as-needed"

          echo "CFLAGS=${CFLAGS}"
          echo "CXXFLAGS=${CXXFLAGS}"
          echo "LDFLAGS=${LDFLAGS}"

          gcc -dM -E ${CFLAGS} - < /dev/null | sort > gcc-macros.txt

          if [[ "${{ matrix.arch }}" == "x64-v2" ]]; then
            grep -q "__SSE4_2__" gcc-macros.txt
            grep -q "__POPCNT__" gcc-macros.txt
            echo "Verified: x86-64-v2 compiler flags are active"
          fi

          if [[ "${{ matrix.arch }}" == "x64-v3" ]]; then
            grep -q "__AVX2__" gcc-macros.txt
            grep -q "__FMA__" gcc-macros.txt
            grep -q "__BMI2__" gcc-macros.txt
            echo "Verified: x86-64-v3 compiler flags are active"
          fi

          cd "qemu-${QEMU_VERSION}"

          ./configure \
            --prefix="$GITHUB_WORKSPACE/${PREFIX_DIR}" \
            --target-list=loongarch64-softmmu \
            --enable-slirp \
            --enable-lto \
            --disable-werror

          make -j"$(nproc)"
          make install

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail

          "$GITHUB_WORKSPACE/${PREFIX_DIR}/bin/qemu-system-loongarch64" --version

          tar -C "$GITHUB_WORKSPACE" \
            -czf "qemu-linux-${{ matrix.arch }}.tar.gz" \
            "${PREFIX_DIR}"

          sha256sum "qemu-linux-${{ matrix.arch }}.tar.gz" \
            > "qemu-linux-${{ matrix.arch }}.tar.gz.sha256"

          ls -lh

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: qemu-linux-${{ matrix.arch }}
          path: |
            qemu-linux-${{ matrix.arch }}.tar.gz
            qemu-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.QEMU_VERSION }}
          name: ${{ env.QEMU_VERSION }}
          files: |
            qemu-linux-${{ matrix.arch }}.tar.gz
            qemu-linux-${{ matrix.arch }}.tar.gz.sha256
          prerelease: false
          make_latest: true
